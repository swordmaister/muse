<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebXR Persistent Viewer</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.0/nipplejs.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; touch-action: none; }
        
        /* ローディング画面 */
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s; pointer-events: none; opacity: 0;
        }
        #loadingOverlay.visible { opacity: 1; pointer-events: auto; }
        
        /* 2D UI */
        .ui-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 10px; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #fff; color: #333; border: none; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        
        #fileNameDisplay { position: fixed; top: 15px; left: 15px; z-index: 100; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 5px; font-size: 1.2rem; display: none; }
        #optionsBtn { position: fixed; top: 15px; right: 15px; z-index: 100; padding: 8px 15px; }

        /* オプションモーダル */
        #optionsModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95); padding: 25px; border-radius: 10px;
            z-index: 10000; display: none; flex-direction: column; gap: 15px; width: 80%; max-width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #optionsModal.visible { display: flex; }
        .modal-row { display: flex; justify-content: space-between; align-items: center; }
        .modal-row label { font-size: 1rem; }
        .modal-row select, .modal-row input { padding: 5px; font-size: 1rem; }
        #closeOptionsBtn { background: #ff4757; color: #fff; margin-top: 10px; }

        /* ジョイスティックとY軸移動UI */
        .joystick-zone { position: fixed; bottom: 0; width: 40%; height: 50%; z-index: 50; display: none; touch-action: none; }
        #joystick-zone-left { left: 0; }
        #joystick-zone-right { right: 0; }
        #elevation-controls {
            position: fixed; right: 15px; top: 50%; transform: translateY(-50%);
            display: none; flex-direction: column; gap: 15px; z-index: 50;
        }
        #elevation-controls button {
            width: 50px; height: 50px; border-radius: 25px; font-size: 20px; font-weight: bold;
            background: rgba(255,255,255,0.6); color: #000; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.5); padding: 0;
        }
    </style>

    <script>
        // ==========================================
        // A-Frame カスタムコンポーネント群
        // ==========================================

        // 1. ピンチズーム（接近・離脱）コンポーネント
        AFRAME.registerComponent('pinch-zoom', {
            init: function () {
                this.initialPinchDistance = 0;
                this.initialRigZ = 0;
                this.rig = document.getElementById('rig');

                // キャンバスが生成されてからイベントを紐づける
                this.el.addEventListener('loaded', () => {
                    const canvas = this.el.sceneEl.canvas;
                    canvas.addEventListener('touchstart', this.onTouchStart.bind(this), {passive: false});
                    canvas.addEventListener('touchmove', this.onTouchMove.bind(this), {passive: false});
                    canvas.addEventListener('touchend', this.onTouchEnd.bind(this));
                });
            },
            onTouchStart: function(e) {
                if (e.touches.length === 2) {
                    this.initialPinchDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    this.initialRigZ = this.rig.object3D.position.z;
                }
            },
            onTouchMove: function(e) {
                if (e.touches.length === 2 && this.initialPinchDistance) {
                    e.preventDefault(); // ブラウザデフォルトのズームを確実に防ぐ
                    const currentDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    const delta = currentDistance - this.initialPinchDistance;
                    const zoomSpeed = 0.02; // スピード調整
                    let newZ = this.initialRigZ - delta * zoomSpeed;
                    
                    // 行き過ぎ防止（0.5m 〜 30m）
                    newZ = Math.max(0.5, Math.min(newZ, 30)); 
                    this.rig.object3D.position.z = newZ;
                }
            },
            onTouchEnd: function() { this.initialPinchDistance = 0; }
        });

        // 2. 仮想ジョイスティック（XYZ移動＋首振り）コンポーネント
        AFRAME.registerComponent('joystick-controls', {
            schema: { enabled: {default: false} },
            init: function () {
                this.moveVector = new THREE.Vector3(0, 0, 0);
                this.lookVector = new THREE.Vector2(0, 0);
                this.rig = document.getElementById('rig');
                this.camera = document.getElementById('camera');
                this.moveSpeed = 0.1;
                this.lookSpeed = 0.04;
                this.elevationDir = 0;

                // Y軸（上下）移動ボタンのイベント
                const bindBtn = (id, dir) => {
                    const btn = document.getElementById(id);
                    const press = (e) => { e.preventDefault(); this.elevationDir = dir; };
                    const release = (e) => { e.preventDefault(); this.elevationDir = 0; };
                    btn.addEventListener('touchstart', press, {passive: false});
                    btn.addEventListener('touchend', release, {passive: false});
                    btn.addEventListener('mousedown', press);
                    btn.addEventListener('mouseup', release);
                    btn.addEventListener('mouseleave', release);
                };
                bindBtn('elevate-up', 1);
                bindBtn('elevate-down', -1);
            },
            tick: function () {
                if (!this.data.enabled) return;

                // X/Z軸移動 (カメラの向きに依存させる)
                if (this.moveVector.lengthSq() > 0) {
                    let yRot = this.camera.object3D.rotation.y;
                    let moveX = this.moveVector.x * Math.cos(yRot) + this.moveVector.z * Math.sin(yRot);
                    let moveZ = -this.moveVector.x * Math.sin(yRot) + this.moveVector.z * Math.cos(yRot);
                    this.rig.object3D.position.x += moveX * this.moveSpeed;
                    this.rig.object3D.position.z += moveZ * this.moveSpeed;
                }

                // Y軸移動 (上下)
                if (this.elevationDir !== 0) {
                    this.rig.object3D.position.y += this.elevationDir * this.moveSpeed;
                }

                // 首振り (ピッチ・ヨー回転)
                if (this.lookVector.lengthSq() > 0) {
                    let pitch = this.camera.object3D.rotation.x - this.lookVector.y * this.lookSpeed;
                    let yaw = this.camera.object3D.rotation.y - this.lookVector.x * this.lookSpeed;
                    
                    // 真上・真下を向きすぎて画面が反転しないよう制限
                    const limit = Math.PI / 2 - 0.1; 
                    pitch = Math.max(-limit, Math.min(limit, pitch));

                    this.camera.object3D.rotation.set(pitch, yaw, 0);

                    // look-controlsを再びオンにした際にカクつかないよう内部データを同期
                    let lookCtrl = this.camera.components['look-controls'];
                    if (lookCtrl) {
                        lookCtrl.pitchObject.rotation.x = pitch;
                        lookCtrl.yawObject.rotation.y = yaw;
                    }
                }
            }
        });
    </script>
</head>
<body>

    <div id="loadingOverlay"><h2 id="loadingMsg">読込中...</h2></div>
    <div id="fileNameDisplay">ファイル名</div>
    <button id="optionsBtn">⚙️ 設定</button>

    <div class="ui-container">
        <button id="prevBtn">前へ</button>
        <button id="nextBtn">次へ</button>
    </div>

    <div id="joystick-zone-left" class="joystick-zone"></div>
    <div id="joystick-zone-right" class="joystick-zone"></div>
    <div id="elevation-controls">
        <button id="elevate-up">▲</button>
        <button id="elevate-down">▼</button>
    </div>

    <div id="optionsModal">
        <h3 style="margin-top: 0; text-align: center;">オプション</h3>
        <div class="modal-row">
            <label for="fileSelect">ファイルへ移動:</label>
            <select id="fileSelect"></select>
        </div>
        <div class="modal-row">
            <label for="autoSwitchSelect">自動切り替え:</label>
            <select id="autoSwitchSelect">
                <option value="0">オフ</option>
                <option value="5000">5秒</option>
                <option value="10000">10秒</option>
                <option value="30000">30秒</option>
            </select>
        </div>
        <div class="modal-row">
            <label for="showNameToggle">ファイル名表示:</label>
            <input type="checkbox" id="showNameToggle" checked>
        </div>
        <div class="modal-row">
            <label for="gyroToggle">スマホジャイロ (傾き):</label>
            <input type="checkbox" id="gyroToggle" checked>
        </div>
        <div class="modal-row" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #444;">
            <label for="joystickToggle" style="color:#7BC8A4; font-weight:bold;">仮想ジョイスティック<br><span style="font-size:0.8rem; font-weight:normal;">(XYZ自由移動 / 上下首振り対応)</span></label>
            <input type="checkbox" id="joystickToggle">
        </div>
        <button id="closeOptionsBtn">閉じる</button>
    </div>

    <a-scene webxr="optionalFeatures: hit-test" device-orientation-permission-ui="enabled: false" pinch-zoom joystick-controls="enabled: false">
        <a-assets id="mainAssets"></a-assets>

        <a-sky color="#ECECEC"></a-sky>
        <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#7BC8A4" static-body></a-plane>
        <a-entity light="type: ambient; color: #BBB"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 0.6" position="-0.5 1 1"></a-entity>

        <a-entity id="contentHolder" position="0 0 0"></a-entity>

        <a-entity id="rig" movement-controls="controls: gamepad, keyboard" position="0 0 5">
            <a-entity id="camera" camera position="0 1.6 0" look-controls="enabled: true; magicWindowTrackingEnabled: true; pointerLockEnabled: false"></a-entity>
            <a-entity oculus-touch-controls="hand: left"></a-entity>
            <a-entity oculus-touch-controls="hand: right" id="rightController"></a-entity>
        </a-entity>
    </a-scene>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzNlRQKSABT7XgRwcjurtzvI3fR4SGRBSU444BXzKoxv6ZAoCYiZzIvTe6oVDzAT4oZ/exec";
        
        let filesList = []; 
        let currentIndex = 0;
        let htmlCache = {}; 
        let autoTimer = null; 
        let managerLeft = null, managerRight = null;

        const loader = document.getElementById('loadingOverlay');
        const contentHolder = document.getElementById('contentHolder');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const fileSelect = document.getElementById('fileSelect');
        const rig = document.getElementById('rig');
        const cameraEl = document.getElementById('camera');
        const sceneEl = document.querySelector('a-scene');

        // ==========================================
        // 初期化とリスト取得
        // ==========================================
        async function init() {
            try {
                showLoader("リスト取得中...");
                const response = await fetch(GAS_WEB_APP_URL);
                filesList = await response.json();
                
                if (filesList.length > 0) {
                    populateFileList();
                    updateOptionsUI();
                    await loadWork(0);
                } else {
                    showLoader("ファイルがありません。");
                }
            } catch (e) { showLoader("通信エラー"); console.error(e); }
        }

        // ==========================================
        // データの取得とキャッシュ
        // ==========================================
        async function fetchWorkData(index) {
            if (htmlCache[index]) return htmlCache[index];
            const response = await fetch(`${GAS_WEB_APP_URL}?fileId=${filesList[index].id}`);
            const htmlText = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            htmlCache[index] = doc;
            return doc;
        }

        function preloadNextWork() {
            let nextIndex = (currentIndex + 1) % filesList.length;
            fetchWorkData(nextIndex).catch(e => console.error(e));
        }

        // ==========================================
        // 作品の表示ロジック
        // ==========================================
        async function loadWork(index) {
            currentIndex = index;
            const fileInfo = filesList[index];
            
            fileNameDisplay.textContent = fileInfo.name;
            fileSelect.value = index;
            
            if (!htmlCache[index]) showLoader(`作品 ${fileInfo.name} を読み込み中...`);

            try {
                const doc = await fetchWorkData(index);
                contentHolder.innerHTML = ''; 

                const importedScene = doc.querySelector('a-scene');
                if (importedScene) {
                    const children = Array.from(importedScene.children);
                    children.forEach(child => contentHolder.appendChild(child.cloneNode(true)));
                } else {
                    contentHolder.innerHTML = doc.body.innerHTML;
                }
            } catch (e) { console.error(e); }

            hideLoader();
            resetViewpoint(); 
            preloadNextWork();
            resetAutoSwitchTimer();
        }

        // ==========================================
        // 切り替えとタイマー制御
        // ==========================================
        function switchWork(direction) {
            let next = (direction === 'next') ? currentIndex + 1 : currentIndex - 1;
            if (next >= filesList.length) next = 0;
            if (next < 0) next = filesList.length - 1;
            loadWork(next);
        }

        function resetAutoSwitchTimer() {
            if (autoTimer) clearTimeout(autoTimer);
            const interval = parseInt(document.getElementById('autoSwitchSelect').value);
            if (interval > 0) {
                autoTimer = setTimeout(() => {
                    let next = (currentIndex + 1) % filesList.length;
                    loadWork(next);
                }, interval);
            }
        }

        function resetViewpoint() {
            // 位置のリセット（X, Y, Z）
            rig.object3D.position.set(0, 0, 5);
            // 回転のリセット
            if (cameraEl.components['look-controls']) {
                cameraEl.components['look-controls'].pitchObject.rotation.x = 0;
                cameraEl.components['look-controls'].yawObject.rotation.y = 0;
            }
            cameraEl.object3D.rotation.set(0, 0, 0);
        }

        // ==========================================
        // オプションメニューとUI制御
        // ==========================================
        const optionsModal = document.getElementById('optionsModal');
        document.getElementById('optionsBtn').onclick = () => optionsModal.classList.add('visible');
        document.getElementById('closeOptionsBtn').onclick = () => optionsModal.classList.remove('visible');

        function populateFileList() {
            fileSelect.innerHTML = '';
            filesList.forEach((file, idx) => {
                let opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = file.name;
                fileSelect.appendChild(opt);
            });
            fileSelect.addEventListener('change', (e) => loadWork(parseInt(e.target.value)));
        }

        // NippleJS（ジョイスティック）の初期化
        function initJoysticks() {
            if (managerLeft) return; 
            
            managerLeft = nipplejs.create({ zone: document.getElementById('joystick-zone-left'), mode: 'dynamic', color: 'white' });
            managerRight = nipplejs.create({ zone: document.getElementById('joystick-zone-right'), mode: 'dynamic', color: 'white' });

            const joystickComp = sceneEl.components['joystick-controls'];

            managerLeft.on('move', (evt, data) => joystickComp.moveVector.set(data.vector.x, 0, -data.vector.y));
            managerLeft.on('end', () => joystickComp.moveVector.set(0, 0, 0));

            managerRight.on('move', (evt, data) => joystickComp.lookVector.set(data.vector.x, data.vector.y));
            managerRight.on('end', () => joystickComp.lookVector.set(0, 0));
        }

        function updateOptionsUI() {
            document.getElementById('showNameToggle').onchange = (e) => fileNameDisplay.style.display = e.target.checked ? 'block' : 'none';
            document.getElementById('gyroToggle').onchange = (e) => cameraEl.setAttribute('look-controls', { magicWindowTrackingEnabled: e.target.checked });
            document.getElementById('autoSwitchSelect').onchange = resetAutoSwitchTimer;

            // 仮想ジョイスティックのON/OFF切り替え
            document.getElementById('joystickToggle').onchange = (e) => {
                const isEnabled = e.target.checked;
                const displayStyle = isEnabled ? 'block' : 'none';
                
                document.getElementById('joystick-zone-left').style.display = displayStyle;
                document.getElementById('joystick-zone-right').style.display = displayStyle;
                document.getElementById('elevation-controls').style.display = isEnabled ? 'flex' : 'none';

                if (isEnabled) {
                    initJoysticks();
                    sceneEl.setAttribute('joystick-controls', 'enabled', true);
                    // 右スティック（首振り）と競合しないようデフォルトのタッチ視点移動を無効化
                    cameraEl.setAttribute('look-controls', 'enabled', false); 
                } else {
                    sceneEl.setAttribute('joystick-controls', 'enabled', false);
                    cameraEl.setAttribute('look-controls', 'enabled', true);
                }
            };
        }

        // 共通ボタン・イベント
        document.getElementById('rightController').addEventListener('abuttondown', () => switchWork('next'));
        document.getElementById('rightController').addEventListener('bbuttondown', () => switchWork('prev'));
        document.getElementById('nextBtn').onclick = () => switchWork('next');
        document.getElementById('prevBtn').onclick = () => switchWork('prev');

        function showLoader(msg) { document.getElementById('loadingMsg').textContent = msg; loader.classList.add('visible'); }
        function hideLoader() { loader.classList.remove('visible'); }

        window.onload = init;
    </script>
</body>
</html>
