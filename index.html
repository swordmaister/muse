<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Procedural Frying Egg</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script>
        /**
         * 修正1: カスタムOrbitControls
         * DOM(setAttribute)ではなく、Three.jsのコア(object3D)を直接操作してクラッシュを防ぐ
         */
        AFRAME.registerComponent('custom-orbit-controls', {
            init: function() {
                this.yaw = 0;
                this.pitch = 0.5;
                this.radius = 5;
                this.isDragging = false;
                this.lastMouse = { x: 0, y: 0 };
                
                window.addEventListener('mousedown', (e) => { this.isDragging = true; this.lastMouse = { x: e.clientX, y: e.clientY }; });
                window.addEventListener('mouseup', () => { this.isDragging = false; });
                window.addEventListener('mousemove', (e) => {
                    if (!this.isDragging) return;
                    const dx = (e.clientX - this.lastMouse.x) * 0.01;
                    const dy = (e.clientY - this.lastMouse.y) * 0.01;
                    this.yaw -= dx;
                    this.pitch = Math.max(0.1, Math.min(Math.PI - 0.1, this.pitch + dy));
                    this.lastMouse = { x: e.clientX, y: e.clientY };
                    this.updateCamera();
                });
                this.updateCamera();
            },
            updateCamera: function() {
                const x = this.radius * Math.sin(this.pitch) * Math.sin(this.yaw);
                const y = this.radius * Math.cos(this.pitch);
                const z = this.radius * Math.sin(this.pitch) * Math.cos(this.yaw);
                
                // setAttributeの代わりに直接Three.jsの座標を更新（安全で高速）
                this.el.object3D.position.set(x, y, z);
                this.el.object3D.lookAt(0, 0, 0);
            }
        });

        /**
         * メイン生成コンポーネント
         * （あなたの素晴らしいロジックをそのまま活かしています）
         */
        AFRAME.registerComponent('frying-egg-generator', {
            init: function() {
                this.geometries = [];
                this.materials = [];
                
                this.CONFIG = {
                    plate: { radius: 2.0, height: 0.1, color: '#1a1a1a' },
                    yolk: { radius: 0.5, height: 0.3, color: '#ff9900' },
                    white: { radius: 1.5, segments: 128, color: '#fcfcfc' },
                    particleCount: 50
                };

                this.CONFIG.plate.y = this.CONFIG.plate.height / 2;
                this.CONFIG.white.y = this.CONFIG.plate.height + 0.02;
                this.CONFIG.yolk.y = this.CONFIG.white.y + 0.02;

                this.buildPlate();
                this.buildWhite();
                this.buildYolk();
                this.buildParticles();
            },

            buildPlate: function() {
                const geo = new THREE.CylinderGeometry(this.CONFIG.plate.radius, this.CONFIG.plate.radius, this.CONFIG.plate.height, 64);
                const mat = new THREE.MeshStandardMaterial({ color: this.CONFIG.plate.color, roughness: 0.3, metalness: 0.8 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = this.CONFIG.plate.y;
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                this.el.setObject3D('plate', mesh);
                this.geometries.push(geo);
                this.materials.push(mat);
            },

            buildWhite: function() {
                const geo = new THREE.PlaneGeometry(3, 3, this.CONFIG.white.segments, this.CONFIG.white.segments);
                geo.rotateX(-Math.PI / 2);
                
                const mat = new THREE.ShaderMaterial({
                    uniforms: { uTime: { value: 0 } },
                    vertexShader: `
                        uniform float uTime;
                        void main() {
                            vec3 pos = position;
                            float dist = length(pos.xz);
                            float noise = sin(pos.x * 20.0 + uTime * 5.0) * sin(pos.z * 20.0 + uTime * 3.0);
                            pos.y += noise * 0.02 * (dist / 1.0);
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                        }
                    `,
                    fragmentShader: `
                        void main() { 
                            gl_FragColor = vec4(0.95, 0.95, 0.9, 1.0); 
                        }
                    `
                });

                this.whiteMesh = new THREE.Mesh(geo, mat);
                this.whiteMesh.position.y = this.CONFIG.white.y;
                this.el.setObject3D('white', this.whiteMesh);
                this.geometries.push(geo);
                this.materials.push(mat);
            },

            buildYolk: function() {
                const geo = new THREE.SphereGeometry(this.CONFIG.yolk.radius, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2);
                const mat = new THREE.MeshStandardMaterial({ color: this.CONFIG.yolk.color, roughness: 0.1, metalness: 0.2 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = this.CONFIG.yolk.y;
                this.el.setObject3D('yolk', mesh);
                this.geometries.push(geo);
                this.materials.push(mat);
            },

            buildParticles: function() {
                const geo = new THREE.BufferGeometry();
                const pos = new Float32Array(this.CONFIG.particleCount * 3);
                for(let i=0; i<this.CONFIG.particleCount*3; i+=3) {
                    pos[i] = (Math.random()-0.5) * 2;
                    pos[i+1] = this.CONFIG.white.y;
                    pos[i+2] = (Math.random()-0.5) * 2;
                }
                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                const mat = new THREE.PointsMaterial({ color: 0xffcc00, size: 0.05 });
                const points = new THREE.Points(geo, mat);
                this.el.setObject3D('particles', points);
                this.geometries.push(geo);
                this.materials.push(mat);
            },

            tick: function(time) {
                // timeが取得できない最初のフレームでのNaNエラーを回避
                const safeTime = time || 0;
                
                if (this.whiteMesh && this.whiteMesh.material.uniforms) {
                    this.whiteMesh.material.uniforms.uTime.value = safeTime * 0.001;
                }
                const points = this.el.getObject3D('particles');
                if(points) {
                    points.rotation.y += 0.001;
                    points.position.y = Math.sin(safeTime * 0.002) * 0.01;
                }
            }
        });
    </script>
</head>
<body>

<a-scene background="color: #222" renderer="antialias: true;">
    <a-entity id="camera-rig" custom-orbit-controls>
        <a-entity camera near="0.1" far="1000" position="0 0 0"></a-entity>
    </a-entity>

    <a-entity frying-egg-generator></a-entity>

    <a-entity light="type: hemisphere; color: #ffffff; groundColor: #000000; intensity: 0.8"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 1.0; castShadow: true" position="2 5 2"></a-entity>
</a-scene>

</body>
</html>
