<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebXR Persistent Viewer</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; touch-action: none; user-select: none; }
        
        /* ローディング画面 */
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s; pointer-events: none; opacity: 0;
        }
        #loadingOverlay.visible { opacity: 1; pointer-events: auto; }
        
        /* 2D UI */
        .ui-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 10px; }
        .base-btn { padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #fff; color: #333; border: none; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        
        #fileNameDisplay { position: fixed; top: 15px; left: 15px; z-index: 100; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 5px; font-size: 1.2rem; display: none; }
        #optionsBtn { position: fixed; top: 15px; right: 15px; z-index: 100; padding: 8px 15px; }

        /* オプションモーダル */
        #optionsModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95); padding: 25px; border-radius: 10px;
            z-index: 10000; display: none; flex-direction: column; gap: 15px; width: 80%; max-width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #optionsModal.visible { display: flex; }
        .modal-row { display: flex; justify-content: space-between; align-items: center; }
        .modal-row label { font-size: 1rem; }
        .modal-row select, .modal-row input { padding: 5px; font-size: 1rem; }
        #closeOptionsBtn { background: #ff4757; color: #fff; margin-top: 10px; }

        /* カスタム十字キー UI (XYZ移動用) */
        #movement-ui { position: fixed; bottom: 80px; left: 20px; right: 20px; z-index: 50; display: none; justify-content: space-between; pointer-events: none; }
        
        #dpad-container { display: grid; grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px 50px; gap: 5px; pointer-events: auto; }
        .dpad-btn { width: 100%; height: 100%; border-radius: 10px; font-weight: bold; font-size: 1.2rem; background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.3); color: #000; display: flex; justify-content: center; align-items: center; }
        .dpad-btn:active { background: rgba(255,255,255,0.8); }
        #btn-fwd { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-back { grid-column: 2; grid-row: 3; }

        #y-container { display: flex; flex-direction: column; gap: 10px; justify-content: center; pointer-events: auto; }
        .y-btn { width: 50px; height: 50px; border-radius: 25px; font-weight: bold; font-size: 1.2rem; background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.3); color: #000; display: flex; justify-content: center; align-items: center; }
        .y-btn:active { background: rgba(255,255,255,0.8); }

    </style>

    <script>
        // ==========================================
        // カスタムコンポーネント（タッチ操作を完全自作）
        // ==========================================

        // 1. ピンチズーム（接近・離脱）
        AFRAME.registerComponent('pinch-zoom', {
            init: function () {
                this.initialDistance = 0;
                this.initialZ = 0;
                this.rig = document.getElementById('rig');
                this.el.sceneEl.canvas.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 2) {
                        this.initialDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                        this.initialZ = this.rig.object3D.position.z;
                    }
                }, {passive: false});
                this.el.sceneEl.canvas.addEventListener('touchmove', (e) => {
                    if (e.touches.length === 2 && this.initialDistance) {
                        e.preventDefault();
                        const currentDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                        const delta = currentDistance - this.initialDistance;
                        let newZ = this.initialZ - delta * 0.02; // スピード調整
                        this.rig.object3D.position.z = Math.max(0.5, Math.min(newZ, 30));
                    }
                }, {passive: false});
                this.el.sceneEl.canvas.addEventListener('touchend', () => { this.initialDistance = 0; });
            }
        });

        // 2. 1本指スワイプでの首振り（上下左右を完全解放）
        AFRAME.registerComponent('custom-touch-look', {
            schema: { enabled: {default: false} },
            init: function () {
                this.pitch = 0;
                this.yaw = 0;
                this.isDragging = false;
                this.lastPos = {x: 0, y: 0};
                this.camera = document.getElementById('camera');

                const canvas = this.el.sceneEl.canvas;
                canvas.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 1 && this.data.enabled) {
                        this.isDragging = true;
                        this.lastPos = { x: e.touches[0].pageX, y: e.touches[0].pageY };
                    }
                }, {passive: false});

                canvas.addEventListener('touchmove', (e) => {
                    if (this.isDragging && e.touches.length === 1 && this.data.enabled) {
                        e.preventDefault();
                        let deltaX = e.touches[0].pageX - this.lastPos.x;
                        let deltaY = e.touches[0].pageY - this.lastPos.y;
                        this.lastPos = { x: e.touches[0].pageX, y: e.touches[0].pageY };

                        this.yaw -= deltaX * 0.005;
                        this.pitch -= deltaY * 0.005;
                        this.pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, this.pitch)); // 真下・真上の制限

                        this.camera.object3D.rotation.set(this.pitch, this.yaw, 0);
                    }
                }, {passive: false});

                canvas.addEventListener('touchend', () => { this.isDragging = false; });
            }
        });

        // 3. UIボタン（十字キー）によるXYZ移動
        AFRAME.registerComponent('dpad-movement', {
            schema: { enabled: {default: false} },
            init: function () {
                this.rig = document.getElementById('rig');
                this.camera = document.getElementById('camera');
                this.moveVector = new THREE.Vector3(0,0,0);
                this.speed = 0.08;

                const bindBtn = (id, vec) => {
                    const btn = document.getElementById(id);
                    if(!btn) return;
                    const press = (e) => { e.preventDefault(); this.moveVector.add(vec); };
                    const release = (e) => { e.preventDefault(); this.moveVector.sub(vec); };
                    
                    btn.addEventListener('touchstart', press, {passive: false});
                    btn.addEventListener('touchend', release, {passive: false});
                    btn.addEventListener('mousedown', press);
                    btn.addEventListener('mouseup', release);
                    btn.addEventListener('mouseleave', release);
                };

                bindBtn('btn-fwd', new THREE.Vector3(0,0,-1));
                bindBtn('btn-back', new THREE.Vector3(0,0,1));
                bindBtn('btn-left', new THREE.Vector3(-1,0,0));
                bindBtn('btn-right', new THREE.Vector3(1,0,0));
                bindBtn('btn-up', new THREE.Vector3(0,1,0));
                bindBtn('btn-down', new THREE.Vector3(0,-1,0));
            },
            tick: function () {
                if (!this.data.enabled || this.moveVector.lengthSq() === 0) return;

                // カメラの向いている方向（ヨー角）に合わせて前後左右を計算
                let yRot = this.camera.object3D.rotation.y;
                let moveX = this.moveVector.x * Math.cos(yRot) + this.moveVector.z * Math.sin(yRot);
                let moveZ = -this.moveVector.x * Math.sin(yRot) + this.moveVector.z * Math.cos(yRot);

                this.rig.object3D.position.x += moveX * this.speed;
                this.rig.object3D.position.z += moveZ * this.speed;
                this.rig.object3D.position.y += this.moveVector.y * this.speed;
            }
        });
    </script>
</head>
<body>

    <div id="loadingOverlay"><h2 id="loadingMsg">読込中...</h2></div>
    <div id="fileNameDisplay">ファイル名</div>
    <button id="optionsBtn" class="base-btn">⚙️ 設定</button>

    <div class="ui-container">
        <button id="prevBtn" class="base-btn">前へ</button>
        <button id="nextBtn" class="base-btn">次へ</button>
    </div>

    <div id="movement-ui">
        <div id="dpad-container">
            <div id="btn-fwd" class="dpad-btn">W</div>
            <div id="btn-left" class="dpad-btn">A</div>
            <div id="btn-right" class="dpad-btn">D</div>
            <div id="btn-back" class="dpad-btn">S</div>
        </div>
        <div id="y-container">
            <div id="btn-up" class="y-btn">▲</div>
            <div id="btn-down" class="y-btn">▼</div>
        </div>
    </div>

    <div id="optionsModal">
        <h3 style="margin-top: 0; text-align: center;">オプション</h3>
        <div class="modal-row">
            <label for="fileSelect">ファイルへ移動:</label>
            <select id="fileSelect"></select>
        </div>
        <div class="modal-row">
            <label for="autoSwitchSelect">自動切り替え:</label>
            <select id="autoSwitchSelect">
                <option value="0">オフ</option>
                <option value="5000">5秒</option>
                <option value="10000">10秒</option>
                <option value="30000">30秒</option>
            </select>
        </div>
        <div class="modal-row">
            <label for="showNameToggle">ファイル名表示:</label>
            <input type="checkbox" id="showNameToggle" checked>
        </div>
        <div class="modal-row">
            <label for="gyroToggle">スマホジャイロ (傾き):</label>
            <input type="checkbox" id="gyroToggle" checked>
        </div>
        <div class="modal-row" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #444;">
            <label for="movementToggle" style="color:#7BC8A4; font-weight:bold;">タッチ移動 UI (XYZ軸移動)</label>
            <input type="checkbox" id="movementToggle">
        </div>
        <button id="closeOptionsBtn" class="base-btn" style="background: #ff4757; color: #fff; margin-top: 10px;">閉じる</button>
    </div>

    <a-scene webxr="optionalFeatures: hit-test" device-orientation-permission-ui="enabled: false" pinch-zoom custom-touch-look="enabled: false" dpad-movement="enabled: false">
        <a-assets id="mainAssets"></a-assets>

        <a-sky color="#ECECEC" id="baseSky"></a-sky>
        <a-plane id="basePlane" position="0 -0.01 0" rotation="-90 0 0" width="100" height="100" color="#7BC8A4" static-body></a-plane>
        <a-entity light="type: ambient; color: #BBB"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 0.6" position="-0.5 1 1"></a-entity>

        <a-entity id="contentHolder" position="0 0 0"></a-entity>

        <a-entity id="rig" movement-controls="controls: gamepad, keyboard" position="0 0 5">
            <a-entity id="camera" camera position="0 1.6 0" look-controls="enabled: true; magicWindowTrackingEnabled: true; pointerLockEnabled: false"></a-entity>
            <a-entity oculus-touch-controls="hand: left"></a-entity>
            <a-entity oculus-touch-controls="hand: right" id="rightController"></a-entity>
        </a-entity>
    </a-scene>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzNlRQKSABT7XgRwcjurtzvI3fR4SGRBSU444BXzKoxv6ZAoCYiZzIvTe6oVDzAT4oZ/exec";
        
        let filesList = []; 
        let currentIndex = 0;
        let htmlCache = {}; 
        let autoTimer = null; 

        const loader = document.getElementById('loadingOverlay');
        const contentHolder = document.getElementById('contentHolder');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const fileSelect = document.getElementById('fileSelect');
        const rig = document.getElementById('rig');
        const cameraEl = document.getElementById('camera');
        const sceneEl = document.querySelector('a-scene');

        // ==========================================
        // システム初期化とロード処理
        // ==========================================
        async function init() {
            try {
                showLoader("リスト取得中...");
                const response = await fetch(GAS_WEB_APP_URL);
                filesList = await response.json();
                
                if (filesList.length > 0) {
                    populateFileList();
                    updateOptionsUI();
                    await loadWork(0);
                } else {
                    showLoader("ファイルがありません。");
                }
            } catch (e) { showLoader("通信エラー"); console.error(e); }
        }

        async function fetchWorkData(index) {
            if (htmlCache[index]) return htmlCache[index];
            const response = await fetch(`${GAS_WEB_APP_URL}?fileId=${filesList[index].id}`);
            const htmlText = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            htmlCache[index] = doc;
            return doc;
        }

        function preloadNextWork() {
            let nextIndex = (currentIndex + 1) % filesList.length;
            fetchWorkData(nextIndex).catch(e => console.error(e));
        }

        async function loadWork(index) {
            currentIndex = index;
            fileNameDisplay.textContent = filesList[index].name;
            fileSelect.value = index;
            
            if (!htmlCache[index]) showLoader(`作品 ${filesList[index].name} を読み込み中...`);

            try {
                const doc = await fetchWorkData(index);
                contentHolder.innerHTML = ''; 

                const importedScene = doc.querySelector('a-scene');
                if (importedScene) {
                    // ★チラつき・動作不良の元凶をフィルタリング
                    // 読み込み先にある「空」「カメラ」「ライト」などを削除し、重複を防ぐ
                    const duplicates = importedScene.querySelectorAll('a-sky, a-camera, [camera]');
                    duplicates.forEach(el => el.remove());

                    const children = Array.from(importedScene.children);
                    children.forEach(child => contentHolder.appendChild(child.cloneNode(true)));
                } else {
                    contentHolder.innerHTML = doc.body.innerHTML;
                }
            } catch (e) { console.error(e); }

            hideLoader();
            resetViewpoint(); 
            preloadNextWork();
            resetAutoSwitchTimer();
        }

        // ==========================================
        // 各種制御ロジック
        // ==========================================
        function switchWork(direction) {
            let next = (direction === 'next') ? currentIndex + 1 : currentIndex - 1;
            if (next >= filesList.length) next = 0;
            if (next < 0) next = filesList.length - 1;
            loadWork(next);
        }

        function resetAutoSwitchTimer() {
            if (autoTimer) clearTimeout(autoTimer);
            const interval = parseInt(document.getElementById('autoSwitchSelect').value);
            if (interval > 0) autoTimer = setTimeout(() => loadWork((currentIndex + 1) % filesList.length), interval);
        }

        function resetViewpoint() {
            rig.object3D.position.set(0, 0, 5);
            // カスタム視点の角度もリセット
            const touchLook = sceneEl.components['custom-touch-look'];
            if(touchLook) { touchLook.pitch = 0; touchLook.yaw = 0; }
            
            if (cameraEl.components['look-controls']) {
                cameraEl.components['look-controls'].pitchObject.rotation.x = 0;
                cameraEl.components['look-controls'].yawObject.rotation.y = 0;
            }
            cameraEl.object3D.rotation.set(0, 0, 0);
        }

        // ==========================================
        // オプションメニューUI連動
        // ==========================================
        const optionsModal = document.getElementById('optionsModal');
        document.getElementById('optionsBtn').onclick = () => optionsModal.classList.add('visible');
        document.getElementById('closeOptionsBtn').onclick = () => optionsModal.classList.remove('visible');

        function populateFileList() {
            fileSelect.innerHTML = '';
            filesList.forEach((file, idx) => {
                let opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = file.name;
                fileSelect.appendChild(opt);
            });
            fileSelect.addEventListener('change', (e) => loadWork(parseInt(e.target.value)));
        }

        function updateOptionsUI() {
            document.getElementById('showNameToggle').onchange = (e) => fileNameDisplay.style.display = e.target.checked ? 'block' : 'none';
            document.getElementById('autoSwitchSelect').onchange = resetAutoSwitchTimer;

            // ★ジャイロON/OFFとカスタムタッチ視点の切り替え
            document.getElementById('gyroToggle').onchange = (e) => {
                const isGyroOn = e.target.checked;
                // ジャイロONなら標準のlook-controlsを使う。OFFなら自作のタッチ首振りを使う
                cameraEl.setAttribute('look-controls', { magicWindowTrackingEnabled: isGyroOn, enabled: isGyroOn });
                sceneEl.setAttribute('custom-touch-look', 'enabled', !isGyroOn);
            };

            // 十字キーUIの表示切り替え
            document.getElementById('movementToggle').onchange = (e) => {
                const isEnabled = e.target.checked;
                document.getElementById('movement-ui').style.display = isEnabled ? 'flex' : 'none';
                sceneEl.setAttribute('dpad-movement', 'enabled', isEnabled);
            };
        }

        // コントローラー・ボタン登録
        document.getElementById('rightController').addEventListener('abuttondown', () => switchWork('next'));
        document.getElementById('rightController').addEventListener('bbuttondown', () => switchWork('prev'));
        document.getElementById('nextBtn').onclick = () => switchWork('next');
        document.getElementById('prevBtn').onclick = () => switchWork('prev');

        function showLoader(msg) { document.getElementById('loadingMsg').textContent = msg; loader.classList.add('visible'); }
        function hideLoader() { loader.classList.remove('visible'); }

        window.onload = init;
    </script>
</body>
</html>
