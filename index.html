<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebXR Persistent Viewer</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; touch-action: none; user-select: none; }
        
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s; pointer-events: none; opacity: 0;
        }
        #loadingOverlay.visible { opacity: 1; pointer-events: auto; }
        
        .ui-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 10px; }
        .base-btn { padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #fff; color: #333; border: none; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        
        #fileNameDisplay { position: fixed; top: 15px; left: 15px; z-index: 100; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 5px; font-size: 1.2rem; display: block; }
        #optionsBtn { position: fixed; top: 15px; right: 15px; z-index: 100; padding: 8px 15px; }

        #optionsModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95); padding: 25px; border-radius: 10px; z-index: 10000; display: none; flex-direction: column; gap: 15px; width: 80%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #optionsModal.visible { display: flex; }
        .modal-row { display: flex; justify-content: space-between; align-items: center; }
        .modal-row label { font-size: 1rem; }
        .modal-row select, .modal-row input { padding: 5px; font-size: 1rem; }

        #movement-ui { position: fixed; bottom: 80px; left: 20px; right: 20px; z-index: 50; display: flex; justify-content: space-between; pointer-events: none; }
        #dpad-container { display: grid; grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px 50px; gap: 5px; pointer-events: auto; }
        .dpad-btn { width: 100%; height: 100%; border-radius: 10px; font-weight: bold; font-size: 1.2rem; background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.3); color: #000; display: flex; justify-content: center; align-items: center; }
        .dpad-btn:active { background: rgba(255,255,255,0.8); }
        #btn-fwd { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-back { grid-column: 2; grid-row: 3; }
        #y-container { display: flex; flex-direction: column; gap: 10px; justify-content: center; pointer-events: auto; }
        .y-btn { width: 50px; height: 50px; border-radius: 25px; font-weight: bold; font-size: 1.2rem; background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.3); color: #000; display: flex; justify-content: center; align-items: center; }
        .y-btn:active { background: rgba(255,255,255,0.8); }
    </style>

    <script>
        // コンポーネント重複エラー回避
        const originalRegisterComponent = AFRAME.registerComponent;
        AFRAME.registerComponent = function (name, definition) {
            if (AFRAME.components[name]) delete AFRAME.components[name];
            return originalRegisterComponent.call(this, name, definition);
        };

        // コントローラー・操作系コンポーネント (変更なし)
        AFRAME.registerComponent('quest-controller-actions', {
            init: function () {
                this.rig = document.getElementById('rig');
                this.isRightUp = false; this.isLeftDown = false; this.speed = 0.05;
                this.isJumping = false; this.jumpVelocity = 0; this.gravity = 0.008; this.baseY = 0;
                const leftCtrl = document.getElementById('leftController'), rightCtrl = document.getElementById('rightController'), vrMenu = document.getElementById('vrMenu');
                leftCtrl.addEventListener('ybuttondown', () => {
                    if (this.el.sceneEl.is('vr-mode')) vrMenu.setAttribute('visible', !vrMenu.getAttribute('visible'));
                    else document.getElementById('optionsModal').classList.add('visible');
                });
                leftCtrl.addEventListener('xbuttondown', () => {
                    if (!this.isJumping) { this.baseY = this.rig.object3D.position.y; this.jumpVelocity = 0.15; this.isJumping = true; }
                });
                rightCtrl.addEventListener('gripdown', () => { this.isRightUp = true; }); rightCtrl.addEventListener('gripup', () => { this.isRightUp = false; });
                leftCtrl.addEventListener('gripdown', () => { this.isLeftDown = true; }); leftCtrl.addEventListener('gripup', () => { this.isLeftDown = false; });
            },
            tick: function () {
                if (this.isRightUp && !this.isJumping) this.rig.object3D.position.y += this.speed;
                if (this.isLeftDown && !this.isJumping) this.rig.object3D.position.y -= this.speed;
                if (this.isJumping) {
                    this.rig.object3D.position.y += this.jumpVelocity; this.jumpVelocity -= this.gravity;
                    if (this.rig.object3D.position.y <= this.baseY) { this.rig.object3D.position.y = this.baseY; this.isJumping = false; }
                }
            }
        });

        AFRAME.registerComponent('pinch-zoom', {
            init: function () {
                this.initialDistance = 0; this.initialZ = 0; this.rig = document.getElementById('rig');
                this.el.sceneEl.canvas.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 2) { this.initialDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); this.initialZ = this.rig.object3D.position.z; }
                }, {passive: false});
                this.el.sceneEl.canvas.addEventListener('touchmove', (e) => {
                    if (e.touches.length === 2 && this.initialDistance) {
                        e.preventDefault();
                        const currentDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                        this.rig.object3D.position.z = Math.max(0.5, Math.min(this.initialZ - (currentDistance - this.initialDistance) * 0.02, 30));
                    }
                }, {passive: false});
                this.el.sceneEl.canvas.addEventListener('touchend', () => { this.initialDistance = 0; });
            }
        });

        AFRAME.registerComponent('custom-touch-look', {
            schema: { enabled: {default: false} },
            init: function () {
                this.pitch = 0; this.yaw = 0; this.isDragging = false; this.lastPos = {x: 0, y: 0}; this.camera = document.getElementById('camera');
                const canvas = this.el.sceneEl.canvas;
                canvas.addEventListener('touchstart', (e) => { if (e.touches.length === 1 && this.data.enabled) { this.isDragging = true; this.lastPos = { x: e.touches[0].pageX, y: e.touches[0].pageY }; } }, {passive: false});
                canvas.addEventListener('touchmove', (e) => {
                    if (this.isDragging && e.touches.length === 1 && this.data.enabled) {
                        e.preventDefault();
                        this.yaw -= (e.touches[0].pageX - this.lastPos.x) * 0.005;
                        this.pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, this.pitch - (e.touches[0].pageY - this.lastPos.y) * 0.005)); 
                        this.lastPos = { x: e.touches[0].pageX, y: e.touches[0].pageY };
                        this.camera.object3D.rotation.set(this.pitch, this.yaw, 0);
                    }
                }, {passive: false});
                canvas.addEventListener('touchend', () => { this.isDragging = false; });
            }
        });

        AFRAME.registerComponent('dpad-movement', {
            schema: { enabled: {default: false} },
            init: function () {
                this.rig = document.getElementById('rig'); this.camera = document.getElementById('camera'); this.moveVector = new THREE.Vector3(0,0,0); this.speed = 0.08;
                this.btnStates = { 'btn-fwd': false, 'btn-back': false, 'btn-left': false, 'btn-right': false, 'btn-up': false, 'btn-down': false };
                const bindBtn = (id) => {
                    const btn = document.getElementById(id); if(!btn) return;
                    const press = (e) => { if (e.cancelable) e.preventDefault(); this.btnStates[id] = true; };
                    const release = (e) => { if (e.cancelable) e.preventDefault(); this.btnStates[id] = false; };
                    btn.addEventListener('touchstart', press, {passive: false}); btn.addEventListener('touchend', release, {passive: false});
                    btn.addEventListener('mousedown', press); btn.addEventListener('mouseup', release); btn.addEventListener('mouseleave', release);
                };
                ['btn-fwd', 'btn-back', 'btn-left', 'btn-right', 'btn-up', 'btn-down'].forEach(bindBtn);
            },
            tick: function () {
                if (!this.data.enabled) return;
                this.moveVector.set(0, 0, 0);
                if (this.btnStates['btn-fwd']) this.moveVector.z -= 1; if (this.btnStates['btn-back']) this.moveVector.z += 1;
                if (this.btnStates['btn-left']) this.moveVector.x -= 1; if (this.btnStates['btn-right']) this.moveVector.x += 1;
                if (this.btnStates['btn-up']) this.moveVector.y += 1; if (this.btnStates['btn-down']) this.moveVector.y -= 1;
                if (this.moveVector.lengthSq() === 0) return;
                let yRot = this.camera.object3D.rotation.y;
                this.rig.object3D.position.x += (this.moveVector.x * Math.cos(yRot) + this.moveVector.z * Math.sin(yRot)) * this.speed;
                this.rig.object3D.position.z += (-this.moveVector.x * Math.sin(yRot) + this.moveVector.z * Math.cos(yRot)) * this.speed;
                this.rig.object3D.position.y += this.moveVector.y * this.speed;
            }
        });
    </script>
</head>
<body>

    <div id="loadingOverlay"><h2 id="loadingMsg">読込中...</h2></div>
    <div id="fileNameDisplay"></div>
    <button id="optionsBtn" class="base-btn">⚙️ 設定</button>

    <div class="ui-container">
        <button id="prevBtn" class="base-btn">前へ</button>
        <button id="nextBtn" class="base-btn">次へ</button>
    </div>

    <div id="movement-ui">
        <div id="dpad-container">
            <div id="btn-fwd" class="dpad-btn">W</div><div id="btn-left" class="dpad-btn">A</div><div id="btn-right" class="dpad-btn">D</div><div id="btn-back" class="dpad-btn">S</div>
        </div>
        <div id="y-container"><div id="btn-up" class="y-btn">▲</div><div id="btn-down" class="y-btn">▼</div></div>
    </div>

    <div id="optionsModal">
        <h3 style="margin-top: 0; text-align: center;">オプション</h3>
        <div class="modal-row"><label for="fileSelect">ファイルへ移動:</label><select id="fileSelect"></select></div>
        <div class="modal-row">
            <label for="autoSwitchSelect">自動切り替え:</label>
            <select id="autoSwitchSelect"><option value="0">オフ</option><option value="5000">5秒</option><option value="10000">10秒</option><option value="30000">30秒</option></select>
        </div>
        <div class="modal-row"><label for="showNameToggle">ファイル名表示:</label><input type="checkbox" id="showNameToggle" checked></div>
        <div class="modal-row"><label for="gyroToggle">スマホジャイロ (傾き):</label><input type="checkbox" id="gyroToggle"></div>
        <div class="modal-row" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #444;"><label for="movementToggle" style="color:#7BC8A4; font-weight:bold;">タッチ移動 UI (XYZ軸移動)</label><input type="checkbox" id="movementToggle" checked></div>
        <button id="closeOptionsBtn" class="base-btn" style="background: #ff4757; color: #fff; margin-top: 10px;">閉じる</button>
    </div>

    <a-scene webxr="optionalFeatures: hit-test" device-orientation-permission-ui="enabled: false" pinch-zoom custom-touch-look="enabled: true" dpad-movement="enabled: true" quest-controller-actions>
        <a-assets id="mainAssets"></a-assets>

        <a-sky color="#ECECEC" id="baseSky"></a-sky>
        <a-plane id="basePlane" position="0 -0.01 0" rotation="-90 0 0" width="100" height="100" color="#7BC8A4" static-body></a-plane>
        <a-entity id="baseAmbientLight" light="type: ambient; color: #BBB"></a-entity>
        <a-entity id="baseDirLight" light="type: directional; color: #FFF; intensity: 0.6" position="-0.5 1 1"></a-entity>

        <a-entity id="contentHolder" position="0 0 0"></a-entity>

        <a-entity id="rig" movement-controls="controls: gamepad, keyboard" position="0 0 5">
            <a-entity id="camera" camera position="0 1.6 0" look-controls="enabled: false; magicWindowTrackingEnabled: false; pointerLockEnabled: false">
                <a-text id="vrFileNameDisplay" value="" position="0 0.6 -1.5" align="center" width="2" color="#333" visible="true"></a-text>
            </a-entity>
            <a-entity id="leftController" oculus-touch-controls="hand: left">
                <a-entity id="vrMenu" visible="false" position="0 0.15 -0.05" rotation="-45 0 0">
                    <a-plane width="0.35" height="0.35" color="#111" opacity="0.95" border-radius="0.05"></a-plane>
                    <a-text value="VR Options Menu" position="0 0.14 0.01" align="center" width="0.8" color="#7BC8A4"></a-text>
                    <a-entity class="vr-btn" id="vrBtnPrev" position="-0.08 0.07 0.01" geometry="primitive: plane; width: 0.14; height: 0.05" material="color: #444" text="value: < Prev; align: center; width: 0.6"></a-entity>
                    <a-entity class="vr-btn" id="vrBtnNext" position="0.08 0.07 0.01" geometry="primitive: plane; width: 0.14; height: 0.05" material="color: #444" text="value: Next >; align: center; width: 0.6"></a-entity>
                    <a-entity class="vr-btn" id="vrBtnAuto" position="0 0.0 0.01" geometry="primitive: plane; width: 0.3; height: 0.05" material="color: #444" text="value: Auto Switch: OFF; align: center; width: 0.6"></a-entity>
                    <a-entity class="vr-btn" id="vrBtnName" position="0 -0.07 0.01" geometry="primitive: plane; width: 0.3; height: 0.05" material="color: #444" text="value: File Name: ON; align: center; width: 0.6"></a-entity>
                    <a-entity class="vr-btn" id="vrBtnClose" position="0 -0.14 0.01" geometry="primitive: plane; width: 0.3; height: 0.05" material="color: #A33" text="value: Close Menu; align: center; width: 0.6"></a-entity>
                </a-entity>
            </a-entity>
            <a-entity id="rightController" oculus-touch-controls="hand: right" raycaster="objects: .vr-btn; showLine: true; far: 2" cursor="rayOrigin: entity"></a-entity>
        </a-entity>
    </a-scene>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzNlRQKSABT7XgRwcjurtzvI3fR4SGRBSU444BXzKoxv6ZAoCYiZzIvTe6oVDzAT4oZ/exec";
        
        let filesList = []; 
        let currentIndex = 0;
        let htmlCache = {}; 
        let autoTimer = null; 
        let vrAutoIntervals = [0, 5000, 10000, 30000];
        let vrAutoIndex = 0;
        let currentLoadId = 0; // ★ 追加：非同期ロードの競合防止用ID

        const loader = document.getElementById('loadingOverlay'), contentHolder = document.getElementById('contentHolder');
        const fileNameDisplay = document.getElementById('fileNameDisplay'), vrFileNameDisplay = document.getElementById('vrFileNameDisplay');
        const fileSelect = document.getElementById('fileSelect'), rig = document.getElementById('rig');
        const cameraEl = document.getElementById('camera'), sceneEl = document.querySelector('a-scene');

        async function init() {
            setupVRMenuEvents();
            try {
                showLoader("リスト取得中...");
                const response = await fetch(GAS_WEB_APP_URL);
                filesList = await response.json();
                if (filesList.length > 0) { populateFileList(); updateOptionsUI(); await loadWork(0); } 
                else { showLoader("ファイルがありません。"); }
            } catch (e) { showLoader("通信エラー"); console.error(e); }
        }

        async function fetchWorkData(index) {
            if (htmlCache[index]) return htmlCache[index];
            const response = await fetch(`${GAS_WEB_APP_URL}?fileId=${filesList[index].id}`);
            const htmlText = await response.text();
            htmlCache[index] = new DOMParser().parseFromString(htmlText, 'text/html');
            return htmlCache[index];
        }

        function preloadNextWork() { fetchWorkData((currentIndex + 1) % filesList.length).catch(e => console.error(e)); }

        // ==========================================
        // 【改修版】外部作品を安全に読み込むコア関数
        // ==========================================
        async function loadWork(index) {
            const loadId = ++currentLoadId; // ★ 現在のロードIDを記録
            currentIndex = index;
            const displayName = filesList[index].name;
            fileNameDisplay.textContent = displayName; vrFileNameDisplay.setAttribute('value', displayName); 
            fileSelect.value = index;
            if (!htmlCache[index]) showLoader(`読み込み中...`); 

            try {
                const doc = await fetchWorkData(index);
                
                // ★ 通信中に別のロードが開始されていたら、古い処理をここで破棄（競合防止）
                if (loadId !== currentLoadId) return;
                
                // 1. 古い要素とアセットを完全にクリア
                while (contentHolder.firstChild) contentHolder.removeChild(contentHolder.firstChild);
                const mainAssets = document.getElementById('mainAssets');
                while (mainAssets.firstChild) mainAssets.removeChild(mainAssets.firstChild);

                // ★ 追加: 外部スクリプトによって a-scene 直下に追加された「野良エンティティ」の掃除
                const allowedIds = ['baseSky', 'basePlane', 'baseAmbientLight', 'baseDirLight', 'contentHolder', 'rig', 'mainAssets'];
                Array.from(sceneEl.children).forEach(child => {
                    if (child.id && allowedIds.includes(child.id)) return;
                    if (child.tagName && child.tagName.toLowerCase() === 'canvas') return;
                    if (child.classList && child.classList.contains('a-canvas')) return;
                    if (child.hasAttribute && child.hasAttribute('aframe-injected')) return;
                    child.remove();
                });

                // 2. 外部ファイルの <script> 処理
                const scripts = doc.querySelectorAll('script');
                scripts.forEach(script => {
                    // aframe等のライブラリは除外してキャッシュからも消す
                    if (script.src && (script.src.includes('aframe') || script.src.includes('three'))) {
                        script.remove(); return;
                    }
                    const newScript = document.createElement('script');
                    if (script.src) newScript.src = script.src;
                    else newScript.textContent = script.textContent;
                    document.body.appendChild(newScript);
                    
                    // ★ キャッシュ(doc)からscriptを削除し、同じ作品を再度開いた時の二重実行を防ぐ
                    script.remove();
                });

                const importedScene = doc.querySelector('a-scene');
                if (importedScene) {
                    // 3. 属性コピー
                    ['fog', 'background', 'environment', 'renderer', 'shadow'].forEach(attr => {
                        if (importedScene.hasAttribute(attr)) sceneEl.setAttribute(attr, importedScene.getAttribute(attr));
                        else sceneEl.removeAttribute(attr);
                    });

                    // 4. 重複要素の削除
                    importedScene.querySelectorAll('a-sky, a-camera, [camera], #rig').forEach(el => el.remove());

                    // ★ 追加: 外部ファイルのアセットをメインの <a-assets> に統合して管理
                    const importedAssets = importedScene.querySelector('a-assets');
                    if (importedAssets) {
                        Array.from(importedAssets.children).forEach(asset => mainAssets.appendChild(asset.cloneNode(true)));
                        importedAssets.remove(); // contentHolderへの混入を防ぐ
                    }

                    document.getElementById('baseSky').setAttribute('visible', !importedScene.hasAttribute('fog') && !importedScene.hasAttribute('background'));
                    document.getElementById('basePlane').setAttribute('visible', !importedScene.hasAttribute('fog') && !importedScene.hasAttribute('background'));

                    // 5. 要素の注入
                    Array.from(importedScene.children).forEach(child => contentHolder.appendChild(child.cloneNode(true)));
                } else {
                    contentHolder.innerHTML = doc.body.innerHTML;
                }
            } catch (e) { console.error("読み込みエラー:", e); }

            hideLoader(); resetViewpoint(); preloadNextWork(); resetAutoSwitchTimer();
        }

        // --- 以下の関数群は変更なし ---
        function switchWork(direction) {
            let next = (direction === 'next') ? currentIndex + 1 : currentIndex - 1;
            if (next >= filesList.length) next = 0;
            if (next < 0) next = filesList.length - 1;
            loadWork(next);
        }

        function resetAutoSwitchTimer() {
            if (autoTimer) clearTimeout(autoTimer);
            const interval = parseInt(document.getElementById('autoSwitchSelect').value);
            if (interval > 0) autoTimer = setTimeout(() => switchWork('next'), interval);
        }

        function resetViewpoint() {
            rig.object3D.position.set(0, 0, 5);
            const touchLook = sceneEl.components['custom-touch-look'];
            if(touchLook) { touchLook.pitch = 0; touchLook.yaw = 0; }
            if (cameraEl.components['look-controls']) {
                cameraEl.components['look-controls'].pitchObject.rotation.x = 0;
                cameraEl.components['look-controls'].yawObject.rotation.y = 0;
            }
            cameraEl.object3D.rotation.set(0, 0, 0);
        }

        function toggleFileNameDisplay(isON) {
            fileNameDisplay.style.display = isON ? 'block' : 'none';
            vrFileNameDisplay.setAttribute('visible', isON);
            document.getElementById('showNameToggle').checked = isON;
            document.getElementById('vrBtnName').setAttribute('text', 'value', 'File Name: ' + (isON ? 'ON' : 'OFF'));
        }

        function setupVRMenuEvents() {
            document.querySelectorAll('.vr-btn').forEach(btn => {
                btn.addEventListener('mouseenter', function() { this.setAttribute('material', 'color', this.id === 'vrBtnClose' ? '#E55' : '#666'); });
                btn.addEventListener('mouseleave', function() { this.setAttribute('material', 'color', this.id === 'vrBtnClose' ? '#A33' : '#444'); });
            });
            document.getElementById('vrBtnPrev').addEventListener('click', () => switchWork('prev'));
            document.getElementById('vrBtnNext').addEventListener('click', () => switchWork('next'));
            document.getElementById('vrBtnClose').addEventListener('click', () => document.getElementById('vrMenu').setAttribute('visible', false));
            document.getElementById('vrBtnAuto').addEventListener('click', function() {
                vrAutoIndex = (vrAutoIndex + 1) % vrAutoIntervals.length;
                let val = vrAutoIntervals[vrAutoIndex];
                this.setAttribute('text', 'value', 'Auto Switch: ' + (val === 0 ? 'OFF' : (val/1000) + 's'));
                document.getElementById('autoSwitchSelect').value = val; resetAutoSwitchTimer();
            });
            document.getElementById('vrBtnName').addEventListener('click', function() { toggleFileNameDisplay(!document.getElementById('showNameToggle').checked); });
        }

        const optionsModal = document.getElementById('optionsModal');
        document.getElementById('optionsBtn').onclick = () => optionsModal.classList.add('visible');
        document.getElementById('closeOptionsBtn').onclick = () => optionsModal.classList.remove('visible');

        function populateFileList() {
            fileSelect.innerHTML = '';
            filesList.forEach((file, idx) => {
                let opt = document.createElement('option'); opt.value = idx; opt.textContent = file.name; fileSelect.appendChild(opt);
            });
            fileSelect.addEventListener('change', (e) => loadWork(parseInt(e.target.value)));
        }

        function updateOptionsUI() {
            document.getElementById('showNameToggle').onchange = (e) => toggleFileNameDisplay(e.target.checked);
            document.getElementById('autoSwitchSelect').onchange = (e) => {
                vrAutoIndex = vrAutoIntervals.indexOf(parseInt(e.target.value));
                document.getElementById('vrBtnAuto').setAttribute('text', 'value', 'Auto Switch: ' + (vrAutoIndex === 0 ? 'OFF' : (vrAutoIntervals[vrAutoIndex]/1000) + 's'));
                resetAutoSwitchTimer();
            };
            document.getElementById('gyroToggle').onchange = (e) => {
                const isGyroOn = e.target.checked;
                cameraEl.setAttribute('look-controls', { magicWindowTrackingEnabled: isGyroOn, enabled: isGyroOn });
                sceneEl.setAttribute('custom-touch-look', 'enabled', !isGyroOn);
            };
            document.getElementById('movementToggle').onchange = (e) => {
                const isEnabled = e.target.checked;
                document.getElementById('movement-ui').style.display = isEnabled ? 'flex' : 'none';
                sceneEl.setAttribute('dpad-movement', 'enabled', isEnabled);
            };
            toggleFileNameDisplay(document.getElementById('showNameToggle').checked);
        }

        document.getElementById('rightController').addEventListener('abuttondown', () => switchWork('next'));
        document.getElementById('rightController').addEventListener('bbuttondown', () => switchWork('prev'));
        document.getElementById('nextBtn').onclick = () => switchWork('next');
        document.getElementById('prevBtn').onclick = () => switchWork('prev');

        function showLoader(msg) { document.getElementById('loadingMsg').textContent = msg; loader.classList.add('visible'); }
        function hideLoader() { loader.classList.remove('visible'); }

        window.onload = init;
    </script>
</body>
</html>
