<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebXR Persistent Viewer</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; touch-action: none; }
        
        /* ローディング画面 */
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s; pointer-events: none; opacity: 0;
        }
        #loadingOverlay.visible { opacity: 1; pointer-events: auto; }
        
        /* 2D UI（VRモード外用） */
        .ui-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 10px; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #fff; color: #333; border: none; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        
        /* ファイル名常時表示 */
        #fileNameDisplay {
            position: fixed; top: 15px; left: 15px; z-index: 100; background: rgba(0,0,0,0.6);
            padding: 8px 15px; border-radius: 5px; font-size: 1.2rem; display: none;
        }

        /* オプションメニューボタン */
        #optionsBtn { position: fixed; top: 15px; right: 15px; z-index: 100; padding: 8px 15px; }

        /* オプションモーダル */
        #optionsModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95); padding: 25px; border-radius: 10px;
            z-index: 10000; display: none; flex-direction: column; gap: 15px; width: 80%; max-width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #optionsModal.visible { display: flex; }
        .modal-row { display: flex; justify-content: space-between; align-items: center; }
        .modal-row label { font-size: 1rem; }
        .modal-row select, .modal-row input { padding: 5px; font-size: 1rem; }
        #closeOptionsBtn { background: #ff4757; color: #fff; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="loadingOverlay"><h2 id="loadingMsg">読込中...</h2></div>
    <div id="fileNameDisplay">ファイル名</div>
    <button id="optionsBtn">⚙️ 設定</button>

    <div class="ui-container">
        <button id="prevBtn">前へ</button>
        <button id="nextBtn">次へ</button>
    </div>

    <div id="optionsModal">
        <h3 style="margin-top: 0; text-align: center;">オプション</h3>
        <div class="modal-row">
            <label for="fileSelect">ファイルへ移動:</label>
            <select id="fileSelect"></select>
        </div>
        <div class="modal-row">
            <label for="autoSwitchSelect">自動切り替え:</label>
            <select id="autoSwitchSelect">
                <option value="0">オフ</option>
                <option value="5000">5秒</option>
                <option value="10000">10秒</option>
                <option value="30000">30秒</option>
            </select>
        </div>
        <div class="modal-row">
            <label for="showNameToggle">ファイル名表示:</label>
            <input type="checkbox" id="showNameToggle" checked>
        </div>
        <div class="modal-row">
            <label for="gyroToggle">スマホジャイロ (傾きで上下視点):</label>
            <input type="checkbox" id="gyroToggle" checked>
        </div>
        <div style="font-size: 0.8rem; color: #aaa; text-align: center;">※ジャイロOFF時、スマホの上下視点移動はできません（AFRAMEの仕様）。タッチ操作は左右のみ効きます。</div>
        <button id="closeOptionsBtn">閉じる</button>
    </div>

    <a-scene webxr="optionalFeatures: hit-test" device-orientation-permission-ui="enabled: false">
        <a-assets id="mainAssets"></a-assets>

        <a-sky color="#ECECEC"></a-sky>
        <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#7BC8A4" static-body></a-plane>
        <a-entity light="type: ambient; color: #BBB"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 0.6" position="-0.5 1 1"></a-entity>

        <a-entity id="contentHolder" position="0 0 0"></a-entity>

        <a-entity id="rig" movement-controls="controls: gamepad, keyboard" position="0 0 5">
            <a-entity id="camera" camera position="0 1.6 0" look-controls="enabled: true; magicWindowTrackingEnabled: true; pointerLockEnabled: false"></a-entity>
            <a-entity oculus-touch-controls="hand: left"></a-entity>
            <a-entity oculus-touch-controls="hand: right" id="rightController"></a-entity>
        </a-entity>
    </a-scene>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzNlRQKSABT7XgRwcjurtzvI3fR4SGRBSU444BXzKoxv6ZAoCYiZzIvTe6oVDzAT4oZ/exec";
        
        let filesList = []; 
        let currentIndex = 0;
        let htmlCache = {}; // バックグラウンド読み込み用キャッシュ (DOM Documentをキャッシュ)
        let autoTimer = null; // 自動切り替え用タイマー

        const loader = document.getElementById('loadingOverlay');
        const contentHolder = document.getElementById('contentHolder');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const fileSelect = document.getElementById('fileSelect');
        const rig = document.getElementById('rig');
        const cameraEl = document.getElementById('camera');

        // デフォルトのカメラ距離
        const DEFAULT_RIG_Z = 5;

        // ==========================================
        // 1. 初期化とリスト取得
        // ==========================================
        async function init() {
            try {
                showLoader("リスト取得中...");
                const response = await fetch(GAS_WEB_APP_URL);
                filesList = await response.json();
                
                if (filesList.length > 0) {
                    populateFileList();
                    // オプションUIの初期状態を設定（イベントリスナー登録）
                    updateOptionsUI();
                    await loadWork(0);
                } else {
                    showLoader("ファイルがありません。");
                }
            } catch (e) { showLoader("通信エラー"); console.error(e); }
        }

        // ==========================================
        // 2. データの取得とキャッシュ（バックグラウンド処理）
        // ==========================================
        async function fetchWorkData(index) {
            // 既にキャッシュにあればそれを返す（高速化）
            if (htmlCache[index]) return htmlCache[index];
            
            const response = await fetch(`${GAS_WEB_APP_URL}?fileId=${filesList[index].id}`);
            const htmlText = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            
            htmlCache[index] = doc; // キャッシュに保存
            return doc;
        }

        // 次のファイルをバックグラウンドで読み込む
        function preloadNextWork() {
            let nextIndex = (currentIndex + 1) % filesList.length;
            fetchWorkData(nextIndex).catch(e => console.error("Preload error:", e));
        }

        // ==========================================
        // 3. 作品の表示ロジック
        // ==========================================
        async function loadWork(index) {
            currentIndex = index;
            const fileInfo = filesList[index];
            
            // UI更新
            fileNameDisplay.textContent = fileInfo.name;
            fileSelect.value = index;
            
            // キャッシュにない場合のみローダーを表示
            if (!htmlCache[index]) showLoader(`作品 ${fileInfo.name} を読み込み中...`);

            try {
                const doc = await fetchWorkData(index);
                contentHolder.innerHTML = ''; 

                const importedScene = doc.querySelector('a-scene');
                if (importedScene) {
                    // 2周目問題修正: elementsを直接appendChildするのではなく、cloneNode(true) で追加する。
                    // importedScene.children は Live Collection なので Array.from で取得する
                    const children = Array.from(importedScene.children);
                    children.forEach(child => {
                        contentHolder.appendChild(child.cloneNode(true));
                    });
                } else {
                    contentHolder.innerHTML = doc.body.innerHTML;
                }
            } catch (e) { console.error(e); }

            hideLoader();
            resetViewpoint(); // 視点距離のリセット
            preloadNextWork(); // 次の作品を裏でロード
            resetAutoSwitchTimer(); // タイマーの再設定
        }

        // ==========================================
        // 4. 切り替えとタイマー制御
        // ==========================================
        function switchWork(direction) {
            let next = (direction === 'next') ? currentIndex + 1 : currentIndex - 1;
            if (next >= filesList.length) next = 0;
            if (next < 0) next = filesList.length - 1;
            loadWork(next);
        }

        function resetAutoSwitchTimer() {
            if (autoTimer) clearTimeout(autoTimer);
            const interval = parseInt(document.getElementById('autoSwitchSelect').value);
            if (interval > 0) {
                // switchWork('next') ではなく loadWork(next) を呼ぶように調整
                autoTimer = setTimeout(() => {
                    let next = (currentIndex + 1) % filesList.length;
                    loadWork(next);
                }, interval);
            }
        }

        // ==========================================
        // 5. スマホ用：ピンチ操作によるズーム（視点の接近/離脱）
        // ==========================================
        let initialPinchDistance = null;
        let initialRigZ = null;

        document.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialPinchDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                initialRigZ = rig.getAttribute('position').z;
            }
        }, {passive: false});

        document.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialPinchDistance) {
                e.preventDefault(); // デフォルトのズームを防止
                const currentDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                
                // ズーム機能修正: 計算を線形にする。指を広げた（current > initial）-> ズームイン（Zを減らす）
                const delta = currentDistance - initialPinchDistance;
                const zoomSpeed = 0.05; // ズーム速度調整
                let newZ = initialRigZ - delta * zoomSpeed;

                // 行き過ぎないように制限 (1m 〜 20mの範囲)
                newZ = Math.max(1, Math.min(newZ, 20)); 
                
                let currentPos = rig.getAttribute('position');
                rig.setAttribute('position', {x: currentPos.x, y: currentPos.y, z: newZ});
            }
        }, {passive: false});

        document.addEventListener('touchend', () => { initialPinchDistance = null; });

        function resetViewpoint() {
            let currentPos = rig.getAttribute('position');
            rig.setAttribute('position', {x: currentPos.x, y: currentPos.y, z: DEFAULT_RIG_Z}); // デフォルト距離に戻す
        }

        // ==========================================
        // 6. オプションメニューとUI制御
        // ==========================================
        const optionsModal = document.getElementById('optionsModal');
        
        document.getElementById('optionsBtn').onclick = () => optionsModal.classList.add('visible');
        document.getElementById('closeOptionsBtn').onclick = () => optionsModal.classList.remove('visible');

        function populateFileList() {
            fileSelect.innerHTML = '';
            filesList.forEach((file, idx) => {
                let opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = file.name;
                fileSelect.appendChild(opt);
            });
            fileSelect.addEventListener('change', (e) => loadWork(parseInt(e.target.value)));
        }

        function updateOptionsUI() {
            // ファイル名表示トグル
            const nameToggle = document.getElementById('showNameToggle');
            fileNameDisplay.style.display = nameToggle.checked ? 'block' : 'none';
            nameToggle.onchange = (e) => {
                fileNameDisplay.style.display = e.target.checked ? 'block' : 'none';
            };

            // ジャイロオフ問題修正: look-controls の設定をオブジェクト形式にする
            // ジャイロトグル (magicWindowTrackingEnabled でスマホの傾き検知を制御)
            const gyroToggle = document.getElementById('gyroToggle');
            gyroToggle.onchange = (e) => {
                // オブジェクトとして属性を設定する。iOSの場合、 DeviceOrientation許可が必要になるが、
                // 今回は permissionUIをオフにしているので、ジャイロが効いていれば適用される。
                cameraEl.setAttribute('look-controls', { magicWindowTrackingEnabled: e.target.checked });
            };

            // 自動切り替えイベント
            document.getElementById('autoSwitchSelect').onchange = resetAutoSwitchTimer;
        }

        // 共通ボタン・イベント
        document.getElementById('rightController').addEventListener('abuttondown', () => switchWork('next'));
        document.getElementById('rightController').addEventListener('bbuttondown', () => switchWork('prev'));
        document.getElementById('nextBtn').onclick = () => switchWork('next');
        document.getElementById('prevBtn').onclick = () => switchWork('prev');

        function showLoader(msg) { document.getElementById('loadingMsg').textContent = msg; loader.classList.add('visible'); }
        function hideLoader() { loader.classList.remove('visible'); }

        window.onload = init;
    </script>
</body>
</html>
